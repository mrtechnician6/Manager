<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mrtechnician | Life Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #ff1f44; --bg: #050505; --card: rgba(255, 255, 255, 0.05); }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: var(--card); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .btn-premium { background: var(--accent); transition: all 0.3s ease; }
        .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255, 31, 68, 0.4); }
        .task-done { text-decoration: line-through; opacity: 0.5; }
        .hidden { display: none; }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; color: white; outline: none; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body class="pb-24">

    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-black p-6">
        <div class="glass p-8 w-full max-w-md text-center">
            <h1 class="text-3xl font-bold mb-2 text-white">Mrtechnician</h1>
            <p class="text-gray-400 mb-8">Premium Life Manager</p>
            <div class="flex flex-col gap-4">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="password" placeholder="Password">
                <button onclick="handleAuth('login')" class="btn-premium py-3 rounded-xl font-bold">Login</button>
                <button onclick="handleAuth('signup')" class="text-sm text-gray-400 underline">Create New Account</button>
            </div>
        </div>
    </div>

    <div id="app-screen" class="hidden animate-fade-in">
        <header class="p-6 flex justify-between items-center">
            <div>
                <h2 id="welcome-user" class="text-xl font-bold">Hello, Creator</h2>
                <p id="current-date" class="text-xs text-gray-500 uppercase tracking-widest"></p>
            </div>
            <button onclick="firebase.auth().signOut()" class="text-gray-500"><i class="fa-solid fa-right-from-bracket"></i></button>
        </header>

        <div class="px-6 mb-8">
            <div class="glass p-4 flex justify-between items-center">
                <div>
                    <p class="text-[10px] text-gray-400 uppercase">Discipline Score</p>
                    <h3 id="discipline-percent" class="text-2xl font-black text-red-500">0%</h3>
                </div>
                <div class="w-1/2 bg-gray-800 h-2 rounded-full overflow-hidden">
                    <div id="discipline-bar" class="bg-red-500 h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <main class="px-6">
            <div id="home-view">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-lg">Today's To-Do</h3>
                    <button onclick="toggleModal('todo-modal')" class="btn-premium px-4 py-1 rounded-full text-xs font-bold">+ Add Task</button>
                </div>
                <div id="today-list" class="space-y-3 mb-8">
                    </div>

                <div class="mt-10">
                    <h3 class="font-bold text-lg mb-4 text-gray-400">Set Tomorrow's Plan</h3>
                    <div class="glass p-4">
                        <textarea id="tomorrow-input" placeholder="Type tasks (one per line)..." class="w-full bg-transparent outline-none text-sm h-24"></textarea>
                        <button onclick="saveTomorrow()" class="w-full mt-2 text-xs font-bold text-red-500 py-2 border border-red-500 rounded-lg uppercase tracking-widest">Schedule for Tomorrow</button>
                    </div>
                </div>
            </div>

            <div id="calendar-view" class="hidden">
                <h3 class="font-bold text-xl mb-4">My Calendar</h3>
                <div id="calendar-container" class="glass p-4"></div>
            </div>

            <div id="profile-view" class="hidden">
                <div class="glass p-6 text-center">
                    <div class="w-24 h-24 mx-auto mb-4 border-2 border-red-500 rounded-full overflow-hidden bg-gray-800">
                        <img id="user-avatar" src="https://via.placeholder.com/150" class="w-full h-full object-cover">
                    </div>
                    <h2 id="prof-name" class="text-xl font-bold">---</h2>
                    <p id="prof-job" class="text-gray-500 text-sm mb-6 uppercase tracking-widest">Digital Creator</p>
                    
                    <div class="grid grid-cols-2 gap-4 text-left">
                        <div class="glass p-3"><p class="text-xs text-gray-400">Done</p><h4 id="count-done" class="font-bold">0</h4></div>
                        <div class="glass p-3"><p class="text-xs text-gray-400">Missed</p><h4 id="count-missed" class="font-bold text-red-500">0</h4></div>
                    </div>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-6 left-6 right-6 glass p-4 flex justify-around items-center z-40">
            <button onclick="switchTab('home')" class="nav-btn text-red-500"><i class="fa-solid fa-house"></i></button>
            <button onclick="switchTab('calendar')" class="nav-btn text-gray-500"><i class="fa-solid fa-calendar"></i></button>
            <button onclick="switchTab('profile')" class="nav-btn text-gray-500"><i class="fa-solid fa-user-gear"></i></button>
        </nav>
    </div>

    <div id="todo-modal" class="fixed inset-0 bg-black/80 hidden z-50 p-6 flex items-center">
        <div class="glass p-6 w-full">
            <h3 class="font-bold mb-4">Add Today's Tasks</h3>
            <textarea id="task-entry" class="w-full h-32 mb-4" placeholder="Task 1&#10;Task 2&#10;Task 3..."></textarea>
            <div class="flex gap-2">
                <button onclick="addTasksFromModal()" class="flex-1 btn-premium py-3 rounded-xl font-bold">Add to List</button>
                <button onclick="toggleModal('todo-modal')" class="px-4 py-3 rounded-xl glass">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. FIREBASE INIT ---
        const firebaseConfig = {
            apiKey: "AIzaSyCp8BR3HCaVBf48-81AIW0HpiaVEfVdIIc",
            authDomain: "to-do-b0243.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT.firebaseio.com",
            projectId: "to-do-b0243",
            storageBucket: "to-do-b0243.firebasestorage.app",
            messagingSenderId: "984373301974",
            appId: "1:984373301974:web:05bf84d27da4ed584c6f77"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUser = null;
        let userData = {
            today: [],
            tomorrow: [],
            doneCount: 0,
            missedCount: 0,
            lastLoginDate: ""
        };

     
        // 2. SEND MAGIC LINK
function handleAuth() {
    const email = document.getElementById('email').value;
    const actionCodeSettings = {
        url: window.location.href, // Returns user to this exact page
        handleCodeInApp: true
    };

    auth.sendSignInLinkToEmail(email, actionCodeSettings)
        .then(() => {
            // Save email locally to complete login when they click the link
            window.localStorage.setItem('emailForSignIn', email);
            alert('Check your email! We sent a "Magic Link" to log you in.');
        })
        .catch((error) => alert(error.message));
}

// 3. COMPLETE LOGIN (Checks if the user just clicked the link)
if (auth.isSignInWithEmailLink(window.location.href)) {
    let email = window.localStorage.getItem('emailForSignIn');
    if (!email) {
        email = window.prompt('Please provide your email for confirmation');
    }
    auth.signInWithEmailLink(email, window.location.href)
        .then((result) => {
            window.localStorage.removeItem('emailForSignIn');
            // User is now signed in!
        })
        .catch((error) => alert("Link expired or invalid."));
}
        
   });

        // --- 4. MIDNIGHT SYSTEM & DATA ---
        function loadData() {
            db.ref('users/' + currentUser.uid).on('value', snap => {
                const data = snap.val();
                if (data) {
                    userData = data;
                    checkMidnightSystem();
                    renderAll();
                }
            });
        }

        function checkMidnightSystem() {
            const todayStr = new Date().toDateString();
            if (userData.lastLoginDate !== todayStr && userData.lastLoginDate !== "") {
                // Count missed tasks from yesterday's today list
                const missed = userData.today.filter(t => !t.completed).length;
                const done = userData.today.filter(t => t.completed).length;
                
                userData.doneCount += done;
                userData.missedCount += missed;
                
                // Move tomorrow -> today
                userData.today = userData.tomorrow.map(t => ({ ...t, completed: false }));
                userData.tomorrow = [];
                userData.lastLoginDate = todayStr;
                saveToDB();
            } else if (userData.lastLoginDate === "") {
                userData.lastLoginDate = todayStr;
                saveToDB();
            }
        }

        function saveToDB() {
            if (currentUser) {
                db.ref('users/' + currentUser.uid).set(userData);
            }
        }

        // --- 5. TASK LOGIC ---
        function addTasksFromModal() {
            const lines = document.getElementById('task-entry').value.split('\n').filter(l => l.trim() !== "");
            lines.forEach(text => {
                userData.today.push({ text, completed: false, date: new Date().toLocaleDateString() });
            });
            document.getElementById('task-entry').value = "";
            toggleModal('todo-modal');
            saveToDB();
        }

        function toggleTask(index) {
            userData.today[index].completed = !userData.today[index].completed;
            saveToDB();
        }

        function saveTomorrow() {
            const lines = document.getElementById('tomorrow-input').value.split('\n').filter(l => l.trim() !== "");
            userData.tomorrow = lines.map(text => ({ text, completed: false }));
            document.getElementById('tomorrow-input').value = "";
            alert("Tasks set for tomorrow!");
            saveToDB();
        }

        // --- 6. UI RENDERING ---
        function renderAll() {
            document.getElementById('current-date').innerText = new Date().toDateString();
            
            // Today List
            const listContainer = document.getElementById('today-list');
            listContainer.innerHTML = userData.today.length ? "" : "<p class='text-center text-gray-600 text-sm'>No tasks for today.</p>";
            userData.today.forEach((task, i) => {
                listContainer.innerHTML += `
                    <div onclick="toggleTask(${i})" class="glass p-4 flex items-center justify-between cursor-pointer">
                        <span class="${task.completed ? 'task-done' : ''}">${task.text}</span>
                        <i class="fa-solid ${task.completed ? 'fa-circle-check text-red-500' : 'fa-circle text-gray-700'}"></i>
                    </div>
                `;
            });

            // Discipline
            const total = userData.doneCount + userData.missedCount;
            const percent = total === 0 ? 0 : Math.round((userData.doneCount / total) * 100);
            document.getElementById('discipline-percent').innerText = percent + "%";
            document.getElementById('discipline-bar').style.width = percent + "%";
            
            // Profile
            document.getElementById('count-done').innerText = userData.doneCount;
            document.getElementById('count-missed').innerText = userData.missedCount;
            renderCalendar();
        }

        function renderCalendar() {
            const container = document.getElementById('calendar-container');
            const d = new Date();
            const month = d.toLocaleString('default', { month: 'long' });
            let html = `<div class='text-center mb-4 font-bold'>${month} ${d.getFullYear()}</div><div class='grid grid-cols-7 gap-1 text-[10px] text-gray-500 text-center mb-2'>
                <span>SUN</span><span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span>
            </div><div class='grid grid-cols-7 gap-1 text-center'>`;
            
            for(let i=1; i<=31; i++) {
                const isToday = i === d.getDate() ? 'bg-red-500 rounded-lg' : 'hover:bg-white/10';
                html += `<div class='p-2 text-xs rounded-lg ${isToday} cursor-pointer'>${i}</div>`;
            }
            container.innerHTML = html + "</div>";
        }

        // --- 7. UTILITIES ---
        function switchTab(tab) {
            document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(tab + '-view').classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.replace('text-red-500', 'text-gray-500'));
            event.currentTarget.classList.replace('text-gray-500', 'text-red-500');
        }

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('hidden');
        }
    </script>
</body>
</html>
