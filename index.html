<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mrtechnician | Master Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #ff1f44; --bg-main: #0a0a0a; --card-bg: #141414; }
        body { background-color: var(--bg-main); color: #fff; font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        
        .event-card { 
            background: var(--card-bg); 
            border: 1px solid rgba(255, 255, 255, 0.03); 
            border-radius: 24px; 
            padding: 20px;
            position: relative;
        }

        .progress-container { height: 6px; background: #222; border-radius: 10px; margin-top: 12px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ff1f44, #ff5f78); border-radius: 10px; transition: width 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        .nav-bar { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .tab-btn { padding: 8px 24px; border-radius: 12px; font-size: 12px; font-weight: 800; text-transform: uppercase; transition: 0.3s; }
        .tab-active { background: var(--accent); color: white; }
        .tab-inactive { background: rgba(255,255,255,0.05); color: #666; }

        .hidden { display: none; }
        .accent-text { color: var(--accent); }
    </style>
</head>
<body class="pb-32">

    <div id="app-screen">
        <header class="p-8 flex justify-between items-center">
            <div>
                <h1 id="header-title" class="text-2xl font-black">Mrtechnician</h1>
                <p class="text-[10px] text-gray-500 uppercase font-bold tracking-[0.2em]">Plan your perfect moments</p>
            </div>
            <img id="user-avatar" src="https://via.placeholder.com/40" class="w-10 h-10 rounded-full border border-white/10">
        </header>

        <main id="home-view" class="view-section px-6 space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-[#141414] p-5 rounded-[24px]">
                    <i class="fa-solid fa-calendar-day accent-text mb-2 block"></i>
                    <h4 id="home-stat-count" class="text-xl font-black">0</h4>
                    <p class="text-[9px] text-gray-500 uppercase font-bold">Today's Protocol</p>
                </div>
                <div class="bg-[#141414] p-5 rounded-[24px]">
                    <i class="fa-solid fa-bolt accent-text mb-2 block"></i>
                    <h4 id="home-stat-perc" class="text-xl font-black">0%</h4>
                    <p class="text-[9px] text-gray-500 uppercase font-bold">Discipline</p>
                </div>
            </div>

            <div class="flex justify-between items-center pt-4">
                <h3 class="font-black text-lg">Active Protocol</h3>
                <button onclick="openModal()" class="w-10 h-10 rounded-full bg-red-600 flex items-center justify-center text-xl shadow-lg shadow-red-600/20">+</button>
            </div>
            <div id="home-tasks-container" class="space-y-4"></div>
        </main>

        <main id="records-view" class="view-section px-6 hidden space-y-6">
            <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
                <button onclick="filterRecords('all')" id="filter-all" class="tab-btn tab-active">All</button>
                <button onclick="filterRecords('upcoming')" id="filter-upcoming" class="tab-btn tab-inactive">Upcoming</button>
                <button onclick="filterRecords('past')" id="filter-past" class="tab-btn tab-inactive">Past</button>
            </div>

            <div id="records-container" class="space-y-4">
                </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 p-6 flex justify-around items-center nav-bar z-40">
            <button onclick="showView('home')" id="nav-home" class="accent-text text-2xl transition-all"><i class="fa-solid fa-house"></i></button>
            <button onclick="showView('records')" id="nav-records" class="text-gray-600 text-2xl transition-all"><i class="fa-solid fa-layer-group"></i></button>
            <button class="text-gray-600 text-2xl"><i class="fa-solid fa-calendar-day"></i></button>
            <button class="text-gray-600 text-2xl"><i class="fa-solid fa-user"></i></button>
        </nav>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/95 hidden z-50 flex items-center p-6">
        <div class="event-card p-8 w-full max-w-md border-white/10">
            <h3 class="font-black text-xl mb-6">Initiate Mission</h3>
            <textarea id="modal-input" class="w-full bg-white/5 p-4 rounded-2xl h-40 outline-none border border-white/5 focus:border-red-500" placeholder="Task 1&#10;Task 2..."></textarea>
            <div class="flex gap-4 mt-6">
                <button onclick="submitTasks()" class="flex-1 bg-red-600 font-black py-4 rounded-2xl uppercase text-xs tracking-widest">Commit</button>
                <button onclick="closeModal()" class="px-8 font-bold text-xs opacity-50">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Use the config from your Firebase screenshots
        const firebaseConfig = {
            apiKey: "AIzaSyCp8BR3HCaVBf48-81AIW0HpiaVEfVdIIc",
            authDomain: "to-do-b0243.firebaseapp.com",
            projectId: "to-do-b0243",
            storageBucket: "to-do-b0243.appspot.com",
            messagingSenderId: "984373301974",
            appId: "1:984373301974:web:05bf84d27da4ed584c6f77"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        // Temporary ID for testing (In production, use auth.currentUser.uid)
        const USER_ID = "nirdeshan_kunwar"; 

        let state = { 
            today: [], 
            past: [{text: "Sample Past Task", done: true, date: "Mar 22"}], 
            upcoming: [{text: "Sample Future Task", done: false, date: "Mar 24"}],
            totalDone: 0, 
            totalMissed: 0 
        };

        // --- CORE LOGIC ---
        function sync() {
            db.ref('users/' + USER_ID).on('value', snap => {
                if(snap.val()) { 
                    state = snap.val(); 
                    renderHome();
                    renderRecords('all');
                }
            });
        }

        function createCard(task, index, listType) {
            const isDone = task.done;
            const progress = isDone ? 100 : 25;
            const dateStr = task.date || "Today";
            
            return `
                <div class="event-card" onclick="toggleTask('${listType}', ${index})">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center text-xl">
                            ${isDone ? '✅' : '🎯'}
                        </div>
                        <div class="flex-1">
                            <h4 class="font-bold text-sm ${isDone ? 'line-through opacity-30' : ''}">${task.text}</h4>
                            <div class="flex gap-4 mt-1 text-[8px] font-black uppercase text-gray-500">
                                <span><i class="fa-solid fa-clock accent-text mr-1"></i> ${dateStr}</span>
                                <span><i class="fa-solid fa-check accent-text mr-1"></i> ${isDone ? '1/1' : '0/1'}</span>
                            </div>
                        </div>
                    </div>
                    <div class="mt-4">
                        <div class="flex justify-between text-[8px] font-black uppercase text-gray-600 mb-1">
                            <span>Mission Progress</span>
                            <span>${progress}%</span>
                        </div>
                        <div class="progress-container">
                            <div class="progress-fill" style="width: ${progress}%"></div>
                        </div>
                    </div>
                </div>`;
        }

        function renderHome() {
            const container = document.getElementById('home-tasks-container');
            container.innerHTML = "";
            (state.today || []).forEach((t, i) => container.innerHTML += createCard(t, i, 'today'));
            
            document.getElementById('home-stat-count').innerText = (state.today || []).length;
            const total = (state.totalDone || 0) + (state.totalMissed || 0);
            document.getElementById('home-stat-perc').innerText = total === 0 ? "0%" : Math.round((state.totalDone/total)*100) + "%";
        }

        function renderRecords(filter) {
            const container = document.getElementById('records-container');
            container.innerHTML = "";
            
            if (filter === 'all' || filter === 'upcoming') {
                (state.upcoming || []).forEach((t, i) => container.innerHTML += createCard(t, i, 'upcoming'));
            }
            if (filter === 'all') {
                (state.today || []).forEach((t, i) => container.innerHTML += createCard(t, i, 'today'));
            }
            if (filter === 'all' || filter === 'past') {
                (state.past || []).forEach((t, i) => container.innerHTML += createCard(t, i, 'past'));
            }
        }

        // --- UI ACTIONS ---
        function showView(view) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(view + '-view').classList.remove('hidden');
            
            // Toggle Nav Colors
            document.getElementById('nav-home').className = view === 'home' ? 'accent-text text-2xl' : 'text-gray-600 text-2xl';
            document.getElementById('nav-records').className = view === 'records' ? 'accent-text text-2xl' : 'text-gray-600 text-2xl';
            
            document.getElementById('header-title').innerText = view === 'records' ? 'All Events' : 'Mrtechnician';
        }

        function filterRecords(type) {
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('tab-active');
                b.classList.add('tab-inactive');
            });
            document.getElementById('filter-' + type).classList.replace('tab-inactive', 'tab-active');
            renderRecords(type);
        }

        function toggleTask(type, index) {
            state[type][index].done = !state[type][index].done;
            if(state[type][index].done) state.totalDone++; else state.totalDone--;
            db.ref('users/' + USER_ID).set(state);
        }

        function submitTasks() {
            const lines = document.getElementById('modal-input').value.split('\n').filter(l => l.trim());
            if(!state.today) state.today = [];
            lines.forEach(l => state.today.push({text: l, done: false, date: "Today"}));
            db.ref('users/' + USER_ID).set(state);
            closeModal();
            document.getElementById('modal-input').value = "";
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        sync();
    </script>
</body>
    </html>
