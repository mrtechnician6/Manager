<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Life System</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body { background:#0a0a0a; color:white; }
.card { background:#141414; padding:15px; border-radius:15px; }
</style>
</head>

<body class="p-4 space-y-4">

<h1 class="text-2xl font-bold">🔥 Elite Life System</h1>

<!-- ADD TASK -->
<div class="card space-y-2">
<input id="taskInput" placeholder="Write your mission..." class="w-full p-2 bg-black rounded">
<input type="date" id="taskDate" class="w-full p-2 bg-black rounded">
<button onclick="addTask()" class="bg-red-600 px-4 py-2 rounded w-full">Add Mission</button>
</div>

<!-- TODAY -->
<div class="card">
<h2 class="font-bold mb-2">📅 Today</h2>
<div id="todayList"></div>
</div>

<!-- HABIT -->
<div class="card">
<h2 class="font-bold mb-2">🔥 Habit Tracker</h2>
<input id="habitInput" placeholder="Add habit..." class="w-full p-2 bg-black rounded mb-2">
<button onclick="addHabit()" class="bg-green-600 px-3 py-2 rounded w-full">Add Habit</button>
<div id="habitList" class="mt-3"></div>
</div>

<!-- AI SUGGESTION -->
<div class="card">
<h2 class="font-bold mb-2">🧠 AI Suggestion</h2>
<p id="aiBox" class="text-sm text-gray-300">Start working to get suggestions...</p>
</div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
apiKey: "AIzaSyCp8",
authDomain: "to-do-b0243.firebaseapp.com",
databaseURL: "https://to-do-b0243-default-rtdb.firebaseio.com/",
projectId: "to-do-b0243",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let USER_ID = null;
let tasks = [];
let habits = [];

// LOGIN
auth.signInAnonymously().then(()=>{
auth.onAuthStateChanged(user=>{
USER_ID = user.uid;
sync();
});
});

// SYNC
function sync(){
db.ref("users/"+USER_ID).on("value",snap=>{
const data = snap.val() || {};
tasks = data.tasks ? Object.values(data.tasks) : [];
habits = data.habits ? Object.values(data.habits) : [];
render();
});
}

// ADD TASK
function addTask(){
const text = taskInput.value.trim();
const date = taskDate.value;
if(!text || !date) return alert("Fill all");

const id = "T"+Date.now();
const t = {id,text,date,done:false};

db.ref("users/"+USER_ID+"/tasks/"+id).set(t);
taskInput.value="";
}

// RENDER
function render(){
renderToday();
renderHabits();
aiSuggestion();
}

// TODAY VIEW
function renderToday(){
const today = new Date().toISOString().split("T")[0];
todayList.innerHTML="";

tasks.filter(t=>t.date===today).forEach(t=>{
todayList.innerHTML+=`
<div class="card mt-2 flex justify-between">
<span>${t.text}</span>
<div>
<button onclick="mark('${t.id}',true)" class="bg-green-500 px-2">✔</button>
<button onclick="mark('${t.id}',false)" class="bg-red-500 px-2">✖</button>
</div>
</div>`;
});
}

// MARK DONE
function mark(id,status){
db.ref("users/"+USER_ID+"/tasks/"+id).update({done:status});

if(status){
alert("🔥 Congratulations! Keep going!");
}else{
alert("😔 Do better next time!");
}
}

// ADD HABIT
function addHabit(){
const text = habitInput.value.trim();
if(!text) return;

const id = "H"+Date.now();
const h = {id,text,streak:0,lastDate:null};

db.ref("users/"+USER_ID+"/habits/"+id).set(h);
habitInput.value="";
}

// RENDER HABIT
function renderHabits(){
habitList.innerHTML="";

habits.forEach(h=>{
habitList.innerHTML+=`
<div class="card mt-2 flex justify-between">
<div>
<p>${h.text}</p>
<p class="text-xs text-gray-400">🔥 Streak: ${h.streak}</p>
</div>
<button onclick="completeHabit('${h.id}')" class="bg-green-600 px-2">Done</button>
</div>`;
});
}

// COMPLETE HABIT
function completeHabit(id){
const h = habits.find(x=>x.id===id);
const today = new Date().toISOString().split("T")[0];

let streak = h.streak;

if(h.lastDate){
const yesterday = new Date();
yesterday.setDate(yesterday.getDate()-1);

const y = yesterday.toISOString().split("T")[0];

if(h.lastDate===y){
streak++;
}else if(h.lastDate!==today){
streak=1;
}
}else{
streak=1;
}

db.ref("users/"+USER_ID+"/habits/"+id).update({
streak:streak,
lastDate:today
});
}

// AI SUGGESTION
function aiSuggestion(){
let completed = tasks.filter(t=>t.done).length;
let total = tasks.length;

let msg = "";

if(total===0){
msg = "Start planning your day.";
}
else if(completed===total){
msg = "🔥 Perfect day! You are unstoppable.";
}
else if(completed > total/2){
msg = "💪 Good progress. Push a little more.";
}
else{
msg = "⚠ You are falling behind. Focus now.";
}

aiBox.innerText = msg;
}

</script>

</body>
</html>
