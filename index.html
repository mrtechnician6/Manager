<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mrtechnician | Elite Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #ff1f44; --bg: #000; --card: #111; --success: #22c55e; --danger: #ef4444; }
        body { background-color: var(--bg); color: #fff; font-family: 'Inter', sans-serif; }
        .glass-card { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; padding: 20px; }
        .nav-bar { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px); border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .tab-btn { padding: 10px 18px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .active-tab { background: var(--accent); color: white; }
        .inactive-tab { background: #1a1a1a; color: #555; }
        .hidden { display: none; }
        
        /* Feedback Toast Animation */
        #feedback-pop { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: translateY(100px); opacity: 0; }
        #feedback-pop.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body class="pb-32">

    <div id="auth-screen" class="fixed inset-0 z-[60] flex items-center justify-center bg-black">
        <div class="text-center">
            <h1 class="text-3xl font-black mb-8 tracking-tighter">MRTECHNICIAN</h1>
            <button onclick="login()" class="bg-white text-black font-bold px-8 py-4 rounded-2xl flex items-center gap-3">
                <i class="fa-brands fa-google"></i> Continue with Email
            </button>
        </div>
    </div>

    <div id="feedback-pop" class="fixed bottom-28 left-6 right-6 z-50 glass-card border-white/10 text-center py-6 shadow-2xl">
        <h4 id="feedback-msg" class="font-bold text-sm uppercase italic"></h4>
    </div>

    <div id="app-screen" class="hidden">
        <header class="p-8 flex justify-between items-center">
            <div>
                <h1 id="user-display-name" class="text-2xl font-black">---</h1>
                <p id="user-display-email" class="text-[10px] text-gray-500 font-bold lowercase opacity-60"></p>
            </div>
            <img id="user-display-img" src="" class="w-10 h-10 rounded-full border border-red-500/30">
        </header>

        <main id="home-view" class="view-section px-6 space-y-6">
            <div class="glass-card flex justify-between items-center border-l-4 border-red-600">
                <h3 class="font-black text-lg">Today's To-do list</h3>
                <button onclick="openModal('today')" class="w-10 h-10 rounded-full bg-red-600 flex items-center justify-center text-xl shadow-lg shadow-red-600/30">+</button>
            </div>
            <div id="home-today-container" class="space-y-4"></div>
        </main>

        <main id="todo-view" class="view-section px-6 hidden space-y-6">
            <div class="flex gap-2 overflow-x-auto pb-2">
                <button onclick="filterTodo('present')" id="tab-present" class="tab-btn active-tab">Present Work</button>
                <button onclick="filterTodo('upcoming')" id="tab-upcoming" class="tab-btn inactive-tab whitespace-nowrap">Upcoming Plan</button>
                <button onclick="filterTodo('past')" id="tab-past" class="tab-btn inactive-tab whitespace-nowrap">Past Records</button>
            </div>
            <div id="todo-master-container" class="space-y-4"></div>
        </main>

        <main id="calendar-view" class="view-section px-6 hidden space-y-6">
            <div class="flex justify-between items-center px-2">
                <h3 id="cal-month-year" class="font-black text-xl">---</h3>
                <div class="flex gap-6"><button onclick="moveMonth(-1)"><i class="fa-solid fa-chevron-left"></i></button><button onclick="moveMonth(1)"><i class="fa-solid fa-chevron-right"></i></button></div>
            </div>
            <div class="glass-card">
                <div class="grid grid-cols-7 gap-y-4 text-center text-[9px] font-black text-gray-600 mb-4">
                    <span>SUN</span><span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-2"></div>
            </div>
            <button onclick="openPlanModal()" class="w-full py-5 glass-card border-dashed border-red-500/40 text-red-500 font-black uppercase text-[10px] tracking-widest">
                Your Plan In This Month
            </button>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 p-6 flex justify-around items-center nav-bar z-40">
            <button onclick="showView('home')" id="nav-home" class="text-red-500 text-2xl"><i class="fa-solid fa-house"></i></button>
            <button onclick="showView('todo')" id="nav-todo" class="text-gray-600 text-2xl"><i class="fa-solid fa-layer-group"></i></button>
            <button onclick="showView('calendar')" id="nav-calendar" class="text-gray-600 text-2xl"><i class="fa-solid fa-calendar-day"></i></button>
            <button onclick="auth.signOut()" class="text-gray-600 text-2xl"><i class="fa-solid fa-power-off"></i></button>
        </nav>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/95 hidden z-[70] flex items-center p-6">
        <div class="glass-card p-8 w-full max-w-md">
            <h3 id="modal-title" class="font-black text-xl mb-6">Authorize Mission</h3>
            <div class="mb-4">
                <label class="text-[9px] font-black text-gray-500 uppercase block mb-1">Target Date</label>
                <input type="date" id="mission-date" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 text-white outline-none">
            </div>
            <textarea id="modal-input" class="w-full bg-white/5 p-4 rounded-2xl h-32 outline-none border border-white/10" placeholder="Mission details..."></textarea>
            <div class="flex gap-4 mt-6">
                <button onclick="saveMission()" class="flex-1 bg-red-600 font-black py-4 rounded-2xl uppercase text-[10px]">Commit</button>
                <button onclick="closeModal()" class="px-6 font-bold text-xs opacity-50">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCp8BR3HCaVBf48-81AIW0HpiaVEfVdIIc",
            authDomain: "to-do-b0243.firebaseapp.com",
            databaseURL: "https://to-do-b0243-default-rtdb.firebaseio.com/",
            projectId: "to-do-b0243",
            appId: "1:984373301974:web:05bf84d27da4ed584c6f77"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let missions = [];
        let viewDate = new Date();
        let currentFilter = 'present';
        let UID = "";

        function login() { auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider()); }
        
        auth.onAuthStateChanged(user => {
            if (user) {
                UID = user.uid;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('user-display-name').innerText = user.displayName;
                document.getElementById('user-display-email').innerText = user.email;
                document.getElementById('user-display-img').src = user.photoURL;
                sync();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
            }
        });

        function sync() {
            db.ref('users/' + UID + '/missions').on('value', snap => {
                missions = snap.val() ? Object.values(snap.val()) : [];
                render();
            });
        }

        function createCard(m) {
            return `
                <div class="glass-card flex items-center gap-4">
                    <div class="flex-1">
                        <h4 class="font-bold text-sm ${m.done ? 'line-through opacity-30' : ''}">${m.text}</h4>
                        <p class="text-[8px] font-black text-gray-600 uppercase mt-1 tracking-tighter">${m.date}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="updateMission('${m.id}', true)" class="w-8 h-8 rounded-lg bg-green-500/10 text-green-500 border border-green-500/20"><i class="fa-solid fa-check"></i></button>
                        <button onclick="updateMission('${m.id}', false)" class="w-8 h-8 rounded-lg bg-red-500/10 text-red-500 border border-red-500/20"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                </div>`;
        }

        function render() {
            const todayStr = new Date().toISOString().split('T')[0];
            const homeList = document.getElementById('home-today-container');
            const masterList = document.getElementById('todo-master-container');
            homeList.innerHTML = ""; masterList.innerHTML = "";

            // Homepage Logic
            missions.filter(m => m.date === todayStr).forEach(m => homeList.innerHTML += createCard(m));
            if(homeList.innerHTML === "") homeList.innerHTML = `<p class="text-center text-gray-600 py-10 text-xs">No Missions Today</p>`;

            // Master Records Logic
            const todayTime = new Date().setHours(0,0,0,0);
            let filtered = missions.filter(m => {
                const mTime = new Date(m.date).setHours(0,0,0,0);
                if (currentFilter === 'present') return mTime === todayTime;
                if (currentFilter === 'upcoming') return mTime > todayTime;
                if (currentFilter === 'past') return mTime < todayTime;
            });
            filtered.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(m => masterList.innerHTML += createCard(m));
            
            renderCalendar();
        }

        function updateMission(id, status) {
            const msg = status ? "Congratulations! Keep doing like this 🔥" : "Disappointed! But from next time do better 🎯";
            const pop = document.getElementById('feedback-pop');
            document.getElementById('feedback-msg').innerText = msg;
            document.getElementById('feedback-msg').style.color = status ? '#22c55e' : '#ef4444';
            pop.classList.add('show');
            setTimeout(() => pop.classList.remove('show'), 3000);
            db.ref('users/' + UID + '/missions/' + id).update({ done: status });
        }

        function saveMission() {
            const text = document.getElementById('modal-input').value;
            const date = document.getElementById('mission-date').value;
            if(!text || !date) return;
            const id = "ID-" + Date.now();
            db.ref('users/' + UID + '/missions/' + id).set({ id, text, date, done: false });
            closeModal();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = "";
            const month = viewDate.getMonth();
            const year = viewDate.getFullYear();
            document.getElementById('cal-month-year').innerText = viewDate.toLocaleString('default', { month: 'long', year: 'numeric' });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for(let i=0; i<firstDay; i++) grid.innerHTML += `<div></div>`;
            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday = dateStr === new Date().toISOString().split('T')[0];
                const hasPlan = missions.some(m => m.date === dateStr);
                grid.innerHTML += `
                    <div onclick="openPlanModal('${dateStr}')" class="aspect-square flex flex-col items-center justify-center rounded-xl text-xs relative ${isToday ? 'bg-red-600' : 'bg-white/5'}">
                        ${d}${hasPlan ? '<div class="absolute bottom-1 w-1 h-1 bg-red-400 rounded-full"></div>' : ''}
                    </div>`;
            }
        }

        function showView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(v + '-view').classList.remove('hidden');
            document.querySelectorAll('.nav-bar button').forEach(b => b.classList.replace('text-red-500', 'text-gray-600'));
            document.getElementById('nav-' + v).classList.replace('text-gray-600', 'text-red-500');
        }

        function filterTodo(f) {
            currentFilter = f;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.replace('active-tab', 'inactive-tab'));
            document.getElementById('tab-' + f).classList.replace('inactive-tab', 'active-tab');
            render();
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); document.getElementById('mission-date').value = new Date().toISOString().split('T')[0]; }
        function openPlanModal(d) { document.getElementById('modal').classList.remove('hidden'); document.getElementById('mission-date').value = d || ""; }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function moveMonth(n) { viewDate.setMonth(viewDate.getMonth() + n); renderCalendar(); }
    </script>
</body>
</html>
