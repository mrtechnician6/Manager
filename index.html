<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mrtechnician | Elite Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; }
        .accent-bg { background: #ff1f44; }
        .accent-text { color: #ff1f44; }
        .nav-active { color: #ff1f44; transform: translateY(-5px); transition: all 0.3s; }
        .hidden { display: none; }
    </style>
</head>
<body class="pb-32">

    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-black p-6">
        <div class="glass p-10 w-full max-w-sm text-center">
            <h1 class="text-4xl font-black mb-2 tracking-tighter">MRTECHNICIAN</h1>
            <p class="text-gray-500 text-[10px] uppercase tracking-[0.3em] mb-12">Elite Management System</p>
            <button onclick="login()" class="w-full bg-white text-black font-bold py-4 rounded-2xl flex items-center justify-center gap-3 active:scale-95 transition-transform">
                <i class="fa-brands fa-google"></i> Continue with Google
            </button>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        
        <header class="p-8 flex justify-between items-center">
            <div>
                <p id="header-date" class="text-[10px] text-gray-500 uppercase font-bold tracking-widest mb-1"></p>
                <h2 id="user-welcome" class="text-2xl font-black">Creator</h2>
            </div>
            <img id="user-img" src="" class="w-12 h-12 rounded-full border-2 border-red-500/20">
        </header>

        <main class="px-6">
            
            <section id="home-view" class="view-section">
                <div class="glass p-6 mb-6">
                    <p class="text-[10px] text-gray-500 uppercase font-bold mb-4 tracking-tighter">System Health</p>
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-xs font-bold">Discipline Growth</span>
                        <span id="growth-percent" class="text-3xl font-black accent-text">0%</span>
                    </div>
                    <div class="h-1.5 bg-white/5 rounded-full overflow-hidden">
                        <div id="growth-bar" class="h-full accent-bg transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold">Protocol Tasks</h3>
                    <button onclick="openModal()" class="accent-bg text-[10px] font-black uppercase px-4 py-2 rounded-full">+ Add</button>
                </div>
                <div id="home-task-list" class="space-y-3"></div>
            </section>

            <section id="todo-view" class="view-section hidden">
                <h3 class="text-xl font-bold mb-6">Master Task List</h3>
                <div id="master-todo-list" class="space-y-3"></div>
            </section>

            <section id="calendar-view" class="view-section hidden">
                <h3 class="text-xl font-bold mb-6">Schedule</h3>
                <div class="glass p-6">
                    <div id="calendar-grid" class="grid grid-cols-7 gap-2 text-center">
                        </div>
                </div>
            </section>

            <section id="profile-view" class="view-section hidden text-center">
                <div class="glass p-8">
                    <img id="profile-pic-large" src="" class="w-24 h-24 rounded-full mx-auto border-4 border-red-500/20 mb-4">
                    <h2 id="profile-name" class="text-2xl font-black mb-1">---</h2>
                    <p class="text-gray-500 text-xs uppercase mb-8">Professional Creator</p>
                    
                    <div class="grid grid-cols-2 gap-4 text-left">
                        <div class="bg-white/5 p-4 rounded-2xl">
                            <p class="text-[10px] text-gray-500 uppercase mb-1">Completed</p>
                            <span id="stat-done" class="text-xl font-bold">0</span>
                        </div>
                        <div class="bg-white/5 p-4 rounded-2xl">
                            <p class="text-[10px] text-gray-500 uppercase mb-1">Missed</p>
                            <span id="stat-missed" class="text-xl font-bold accent-text">0</span>
                        </div>
                    </div>
                    <button onclick="auth.signOut()" class="mt-8 text-gray-600 text-[10px] uppercase font-bold tracking-widest">Logout System</button>
                </div>
            </section>

        </main>

        <nav class="fixed bottom-8 left-6 right-6 glass p-5 flex justify-around items-center z-40">
            <button onclick="showView('home')" id="nav-home" class="nav-active text-xl"><i class="fa-solid fa-house"></i></button>
            <button onclick="showView('todo')" id="nav-todo" class="text-gray-600 text-xl"><i class="fa-solid fa-list-check"></i></button>
            <button onclick="showView('calendar')" id="nav-calendar" class="text-gray-600 text-xl"><i class="fa-solid fa-calendar-days"></i></button>
            <button onclick="showView('profile')" id="nav-profile" class="text-gray-600 text-xl"><i class="fa-solid fa-user"></i></button>
        </nav>
    </div>

    <div id="task-modal" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center p-6">
        <div class="glass p-8 w-full">
            <h3 class="font-bold mb-6">Inject New Task</h3>
            <textarea id="modal-input" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10 h-32 mb-4" placeholder="Enter task..."></textarea>
            <div class="flex gap-3">
                <button onclick="addTask()" class="flex-1 accent-bg font-bold py-4 rounded-2xl">Confirm</button>
                <button onclick="closeModal()" class="px-8 bg-white/10 rounded-2xl">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCp8BR3HCaVBf48-81AIW0HpiaVEfVdIIc",
            authDomain: "to-do-b0243.firebaseapp.com",
            databaseURL: "https://to-do-b0243-default-rtdb.firebaseio.com/",
            projectId: "to-do-b0243",
            storageBucket: "to-do-b0243.firebasestorage.app",
            messagingSenderId: "984373301974",
            appId: "1:984373301974:web:05bf84d27da4ed584c6f77"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let userData = { tasks: [], doneCount: 0, missedCount: 0 };

        // AUTH SYSTEM
        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithRedirect(provider);
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('user-welcome').innerText = user.displayName.split(' ')[0];
                document.getElementById('user-img').src = user.photoURL;
                document.getElementById('profile-pic-large').src = user.photoURL;
                document.getElementById('profile-name').innerText = user.displayName;
                syncData(user.uid);
            }
        });

        // DATA SYNC
        function syncData(uid) {
            db.ref('users/' + uid).on('value', snap => {
                const data = snap.val();
                if (data) {
                    userData = data;
                    render();
                } else {
                    db.ref('users/' + uid).set(userData);
                }
            });
        }

        // VIEW NAVIGATION
        function showView(viewName) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(viewName + '-view').classList.remove('hidden');
            
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active', 'accent-text'));
            document.getElementById('nav-' + viewName).classList.add('nav-active', 'accent-text');
        }

        // TASK LOGIC
        function addTask() {
            const val = document.getElementById('modal-input').value;
            if(!userData.tasks) userData.tasks = [];
            userData.tasks.push({ text: val, completed: false });
            save();
            closeModal();
            document.getElementById('modal-input').value = "";
        }

        function toggle(index) {
            userData.tasks[index].completed = !userData.tasks[index].completed;
            userData.tasks[index].completed ? userData.doneCount++ : userData.doneCount--;
            save();
        }

        function save() { db.ref('users/' + auth.currentUser.uid).set(userData); }

        // UI RENDERING
        function render() {
            const homeList = document.getElementById('home-task-list');
            const masterList = document.getElementById('master-todo-list');
            homeList.innerHTML = ""; masterList.innerHTML = "";
            
            if(userData.tasks) {
                userData.tasks.forEach((t, i) => {
                    const html = `
                        <div onclick="toggle(${i})" class="glass p-5 flex justify-between items-center cursor-pointer active:scale-95 transition-all">
                            <span class="${t.completed ? 'line-through opacity-30' : 'font-medium'}">${t.text}</span>
                            <i class="fa-solid ${t.completed ? 'fa-circle-check accent-text' : 'fa-circle text-white/10'}"></i>
                        </div>`;
                    homeList.innerHTML += html;
                    masterList.innerHTML += html;
                });
            }

            const total = (userData.doneCount || 0) + (userData.missedCount || 0);
            const percent = total === 0 ? 0 : Math.round((userData.doneCount / total) * 100);
            document.getElementById('growth-percent').innerText = percent + "%";
            document.getElementById('growth-bar').style.width = percent + "%";
            document.getElementById('stat-done').innerText = userData.doneCount || 0;
            document.getElementById('stat-missed').innerText = userData.missedCount || 0;
            document.getElementById('header-date').innerText = new Date().toDateString();
            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = "";
            const days = ['S','M','T','W','T','F','S'];
            days.forEach(d => grid.innerHTML += `<span class="text-[10px] text-gray-600 font-bold">${d}</span>`);
            for(let i=1; i<=31; i++) {
                const isToday = i === new Date().getDate();
                grid.innerHTML += `<div class="p-3 text-xs rounded-xl ${isToday ? 'accent-bg font-bold' : 'bg-white/5'}">${i}</div>`;
            }
        }

        function openModal() { document.getElementById('task-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('task-modal').classList.add('hidden'); }
    </script>
</body>
    </html>
