<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Life System</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body { background:#0a0a0a; color:white; }
.card { background:#141414; padding:15px; border-radius:15px; }
</style>
</head>

<body class="p-4 space-y-4">

<h1 class="text-2xl font-bold">🔥 Elite Life System</h1>

<!-- ADD TASK -->
<div class="card space-y-2">
<input id="taskInput" placeholder="Write your mission..." class="w-full p-2 bg-black rounded">
<input type="date" id="taskDate" class="w-full p-2 bg-black rounded">
<button onclick="addTask()" class="bg-red-600 px-4 py-2 rounded w-full">Add Mission</button>
</div>

<!-- TODAY -->
<div class="card">
<h2 class="font-bold mb-2">📅 Today</h2>
<div id="todayList"></div>
</div>

<!-- HABIT -->
<div class="card">
<h2 class="font-bold mb-2">🔥 Habit Tracker</h2>
<input id="habitInput" placeholder="Add habit..." class="w-full p-2 bg-black rounded mb-2">
<button onclick="addHabit()" class="bg-green-600 px-3 py-2 rounded w-full">Add Habit</button>
<div id="habitList" class="mt-3"></div>
</div>

<!-- AI SUGGESTION -->
<div class="card">
<h2 class="font-bold mb-2">🧠 AI Suggestion</h2>
<p id="aiBox" class="text-sm text-gray-300">Start working to get suggestions...</p>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCp8BR3HCaVBf48-81AIW0HpiaVEfVdIIc",
    authDomain: "to-do-b0243.firebaseapp.com",
    databaseURL: "https://to-do-b0243-default-rtdb.firebaseio.com/",
    projectId: "to-do-b0243",
    appId: "1:984373301974:web:05bf84d27da4ed584c6f77"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const USER_ID = "nirdeshan_kunwar";

let allMissions = [];
let viewDate = new Date();
let currentFilter = 'present';

// 🔥 REALTIME SYNC
function sync() {
    db.ref('users/' + USER_ID + '/missions').on('value', snap => {
        const data = snap.val();
        allMissions = data ? Object.values(data) : [];
        renderAll();
    });

    document.getElementById('today-date-label').innerText =
        new Date().toDateString();
}

// 🔥 CREATE CARD WITH ✔ ❌
function createCard(m) {
    return `
    <div class="glass-card">
        <div class="flex justify-between items-center">
            <div>
                <h4 class="font-bold text-sm ${m.done ? 'line-through opacity-40 text-gray-500' : ''}">
                    ${m.text}
                </h4>
                <p class="text-[9px] text-gray-500 mt-1">${m.date}</p>
            </div>

            <div class="flex gap-2">
                <button onclick="markDone('${m.id}', true)" class="bg-green-500 px-3 py-1 rounded text-xs">✔</button>
                <button onclick="markDone('${m.id}', false)" class="bg-red-500 px-3 py-1 rounded text-xs">✖</button>
            </div>
        </div>
    </div>`;
}

// 🔥 MARK DONE / NOT DONE
function markDone(id, status) {
    db.ref('users/' + USER_ID + '/missions/' + id).update({ done: status });

    if (status) {
        alert("🔥 Congratulations! Keep going!");
    } else {
        alert("😔 Do better next time!");
    }
}

// 🔥 SAVE MISSION (MAIN FIX)
function saveMission() {
    const text = document.getElementById('modal-input').value.trim();
    const date = document.getElementById('plan-date').value;

    if (!text || !date) return;

    const id = "M-" + Date.now();
    const mission = { id, text, date, done: false };

    // SAVE
    db.ref('users/' + USER_ID + '/missions/' + id).set(mission);

    // 🔥 INSTANT UI UPDATE (IMPORTANT)
    allMissions.push(mission);
    renderAll();

    closeModal();
}

// 🔥 RENDER EVERYTHING
function renderAll() {
    renderHome();
    renderTodoView();
    renderCalendar();
}

// 🔥 HOME (TODAY)
function renderHome() {
    const todayStr = new Date().toISOString().split('T')[0];
    const homeList = document.getElementById('home-today-list');

    const todaysTasks = allMissions.filter(m => m.date === todayStr);

    homeList.innerHTML = "";

    if (todaysTasks.length === 0) {
        homeList.innerHTML = `<p class="text-center text-gray-600 py-10 text-xs italic">No missions today</p>`;
        return;
    }

    todaysTasks.forEach(m => {
        homeList.innerHTML += createCard(m);
    });
}

// 🔥 TODO VIEW (PRESENT / UPCOMING / PAST)
function renderTodoView() {
    const container = document.getElementById('todo-master-container');
    const today = new Date().setHours(0,0,0,0);

    let filtered = allMissions.filter(m => {
        const mDate = new Date(m.date).setHours(0,0,0,0);

        if (currentFilter === 'present') return mDate === today;
        if (currentFilter === 'upcoming') return mDate > today;
        if (currentFilter === 'past') return mDate < today;
    });

    container.innerHTML = "";

    if (filtered.length === 0) {
        container.innerHTML = `<p class="text-center text-gray-600 py-10 text-xs">No data</p>`;
        return;
    }

    filtered.sort((a,b)=> new Date(a.date)-new Date(b.date));

    filtered.forEach(m => {
        container.innerHTML += createCard(m);
    });
}

// 🔥 CALENDAR
function renderCalendar() {
    const grid = document.getElementById('calendar-grid');
    const label = document.getElementById('cal-month-year');

    grid.innerHTML = "";

    const month = viewDate.getMonth();
    const year = viewDate.getFullYear();

    label.innerText = viewDate.toLocaleString('default', { month: 'long', year: 'numeric' });

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    for(let i=0;i<firstDay;i++) grid.innerHTML += `<div></div>`;

    for(let d=1; d<=daysInMonth; d++){
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const hasPlan = allMissions.some(m => m.date === dateStr);

        grid.innerHTML += `
        <div onclick="openPlanModal('${dateStr}')" class="aspect-square flex items-center justify-center rounded-xl text-xs ${hasPlan ? 'bg-red-600' : 'bg-white/5'}">
            ${d}
        </div>`;
    }
}

// NAV
function showView(v) {
    document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
    document.getElementById(v + '-view').classList.remove('hidden');

    document.querySelectorAll('.nav-bar button').forEach(b => b.className = 'text-gray-600 text-2xl');
    document.getElementById('nav-' + v).className = 'text-red-500 text-2xl scale-110';
}

// FILTER
function filterTodo(f) {
    currentFilter = f;
    renderTodoView();
}

// MODAL
function openModal() {
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('plan-date').value = new Date().toISOString().split('T')[0];
}

function openPlanModal(date) {
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('plan-date').value = date;
}

function closeModal() {
    document.getElementById('modal').classList.add('hidden');
    document.getElementById('modal-input').value = "";
}

// CALENDAR NAV
function changeMonth(dir) {
    viewDate.setMonth(viewDate.getMonth() + dir);
    renderCalendar();
}

// START
sync();
</script>
</body>
</html>
